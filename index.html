<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], } } }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans p-4 md:p-8 transition-colors duration-300">

    <!-- Sync Modal -->
    <div id="sync-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 md:p-8 transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="cloud-sync" class="w-6 h-6 text-indigo-500"></i>
                    Device Sync
                </h3>
                <button id="close-sync" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <!-- Export Section -->
                <div class="bg-indigo-50 dark:bg-indigo-950/30 p-4 rounded-xl border border-indigo-100 dark:border-indigo-900/50">
                    <label class="block text-sm font-bold text-indigo-900 dark:text-indigo-200 mb-2">1. Export to another device</label>
                    <p class="text-xs text-indigo-600 dark:text-indigo-400 mb-3">Copy this code and paste it on your phone or tablet.</p>
                    <div class="flex gap-2">
                        <input id="sync-code-output" type="text" readonly class="flex-1 bg-white dark:bg-slate-900 border border-indigo-200 dark:border-indigo-800 rounded-lg px-3 py-2 text-sm font-mono text-slate-600 dark:text-slate-300 focus:outline-none">
                        <button id="copy-sync-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copy
                        </button>
                    </div>
                </div>

                <!-- Import Section -->
                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">2. Import from another device</label>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-3">Paste a sync code here to overwrite your current data.</p>
                    <div class="flex gap-2">
                        <input id="sync-code-input" type="text" placeholder="Paste code here..." class="flex-1 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm font-mono text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button id="import-sync-btn" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors flex items-center gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i> Sync
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="hidden fixed top-4 right-4 left-4 md:left-auto md:w-96 bg-green-500 text-white p-4 rounded-xl shadow-lg flex items-start justify-between z-50 transition-opacity duration-300">
        <div class="flex items-center gap-3">
            <i id="notif-icon" data-lucide="check-circle" class="w-6 h-6 text-green-100"></i>
            <div>
                <h4 id="notif-title" class="font-bold">Success!</h4>
                <p id="notif-message" class="text-sm text-green-50">Action completed.</p>
            </div>
        </div>
        <button id="close-notif" class="text-green-100 hover:text-white transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Main Content -->
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-300">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                    <i data-lucide="target" class="w-7 h-7 text-indigo-500"></i> Focus Space
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Manage your time, conquer your tasks.</p>
            </div>
            
            <div class="mt-4 md:mt-0 flex flex-wrap items-center gap-3">
                <div class="flex items-center gap-3 bg-indigo-50 dark:bg-indigo-950/40 px-4 py-2 rounded-xl border border-indigo-100 dark:border-indigo-900/50">
                    <i data-lucide="clock" class="w-5 h-5 text-indigo-500"></i>
                    <div>
                        <div id="current-time" class="text-lg font-bold text-indigo-900 dark:text-indigo-100 tabular-nums leading-tight">--:--</div>
                        <div id="current-date" class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-wider leading-tight">--</div>
                    </div>
                </div>

                <button id="open-sync-btn" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 hover:text-indigo-600 dark:hover:text-indigo-300 transition-colors border border-slate-200 dark:border-slate-700 font-medium text-sm">
                    <i data-lucide="smartphone" class="w-4 h-4"></i> Sync Devices
                </button>

                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700">
                    <i data-lucide="moon" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Timer Column -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Timer Card -->
                <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 text-center flex flex-col items-center">
                    <h2 class="text-lg font-semibold text-slate-700 dark:text-slate-200 mb-6 flex items-center gap-2">
                        <i data-lucide="clock" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> Focus Timer
                    </h2>
                    
                    <div class="relative flex items-center justify-center mb-8">
                        <svg class="w-64 h-64 transform -rotate-90">
                            <circle cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100 dark:text-slate-800"></circle>
                            <circle id="progress-circle" cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="753.98" stroke-dashoffset="0" class="text-indigo-500 transition-all duration-1000 ease-linear"></circle>
                        </svg>
                        <div id="time-display" class="absolute text-5xl font-black text-slate-800 dark:text-white tabular-nums tracking-tight">25:00</div>
                    </div>

                    <div class="flex items-center gap-3 mb-8 bg-slate-50 dark:bg-slate-800/50 p-2 rounded-lg border border-slate-200 dark:border-slate-700">
                        <label class="text-sm font-medium text-slate-600 dark:text-slate-400 px-2">Session (min):</label>
                        <input id="session-length" type="number" min="1" max="120" value="25" class="w-16 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md py-1 px-2 text-center font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 text-slate-900 dark:text-white">
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="start-btn" class="flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-md">
                            <i data-lucide="play" class="w-5 h-5"></i> Start Focus
                        </button>
                        <button id="reset-btn" class="flex items-center gap-2 px-4 py-3 rounded-full font-semibold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Restart
                        </button>
                    </div>
                </div>

                <!-- Focus Tracker -->
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-6 rounded-2xl shadow-md text-white border border-transparent dark:border-indigo-400/20 flex justify-between items-center">
                    <div>
                        <h2 class="text-indigo-100 font-medium mb-1 flex items-center gap-2">
                            <i data-lucide="trophy" class="w-5 h-5"></i> Total Focus
                        </h2>
                        <div id="total-focus" class="text-4xl font-black tracking-tight mt-1">0 min</div>
                    </div>
                    <button id="reset-tracker-btn" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white/80 hover:text-white transition-colors" title="Reset Total Time">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Tasks Column -->
            <div class="lg:col-span-7">
                <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 h-full">
                    <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
                        <i data-lucide="list-todo" class="w-6 h-6 text-indigo-500"></i> Working Tasks
                    </h2>

                    <form id="task-form" class="flex gap-3 mb-8">
                        <input id="task-input" type="text" placeholder="What are you working on?" class="flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-700 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="submit" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl font-semibold hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors flex items-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i> <span class="hidden sm:inline">Add</span>
                        </button>
                    </form>

                    <div id="task-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // App State
        let isDarkMode = false;
        let sessionLength = 25;
        let timeLeft = 25 * 60;
        let isActive = false;
        let timerInterval = null;
        let totalFocusMinutes = 0;
        let tasks = [];

        // --- STORAGE SYSTEM ---
        const STORAGE_KEY = 'focusDashData';

        function saveData() {
            const data = { isDarkMode, sessionLength, totalFocusMinutes, tasks };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateSyncCodeUI();
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    isDarkMode = data.isDarkMode || false;
                    sessionLength = data.sessionLength || 25;
                    totalFocusMinutes = data.totalFocusMinutes || 0;
                    tasks = data.tasks || [];
                    
                    timeLeft = sessionLength * 60;
                    applyTheme();
                    updateTimerUI();
                    updateTotalFocusUI();
                    renderTasks();
                } catch (e) {
                    console.error("Error loading saved data", e);
                }
            }
        }

        // Generate Base64 String for Cloud Sync
        function generateSyncCode() {
            const data = { sessionLength, totalFocusMinutes, tasks };
            return btoa(encodeURIComponent(JSON.stringify(data)));
        }

        function importSyncCode(code) {
            try {
                const data = JSON.parse(decodeURIComponent(atob(code)));
                sessionLength = data.sessionLength || 25;
                totalFocusMinutes = data.totalFocusMinutes || 0;
                tasks = data.tasks || [];
                
                timeLeft = sessionLength * 60;
                isActive = false;
                clearInterval(timerInterval);
                
                toggleTimerUI();
                updateTimerUI();
                updateTotalFocusUI();
                renderTasks();
                saveData();
                return true;
            } catch (e) {
                return false;
            }
        }

        // --- DOM Elements ---
        const htmlEl = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sessionInput = document.getElementById('session-length');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resetTrackerBtn = document.getElementById('reset-tracker-btn');
        
        // --- Initialization ---
        loadData();

        // Theme Logic
        function applyTheme() {
            if (isDarkMode) {
                htmlEl.classList.add('dark');
                themeToggleBtn.innerHTML = '<i data-lucide="sun" class="w-5 h-5"></i>';
            } else {
                htmlEl.classList.remove('dark');
                themeToggleBtn.innerHTML = '<i data-lucide="moon" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        }

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            applyTheme();
            saveData();
        });

        // Clock (Dhaka)
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').textContent = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).format(now);
            document.getElementById('current-date').textContent = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Dhaka', weekday: 'short', month: 'short', day: 'numeric' }).format(now);
        }, 1000);

        // Timer Logic
        function formatTime(s) {
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
        }

        function updateTimerUI() {
            document.getElementById('time-display').textContent = formatTime(timeLeft);
            sessionInput.value = sessionLength;
            const offset = isActive ? 753.98 - ((timeLeft / (sessionLength * 60)) * 753.98) : 0;
            document.getElementById('progress-circle').style.strokeDashoffset = offset;
        }

        function toggleTimerUI() {
            startBtn.innerHTML = isActive 
                ? '<i data-lucide="pause" class="w-5 h-5"></i> Pause' 
                : '<i data-lucide="play" class="w-5 h-5"></i> Start Focus';
            startBtn.className = isActive 
                ? 'flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400'
                : 'flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-indigo-600 text-white shadow-md';
            sessionInput.disabled = isActive;
            lucide.createIcons();
        }

        startBtn.addEventListener('click', () => {
            isActive = !isActive;
            toggleTimerUI();
            if (isActive) {
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateTimerUI(); } 
                    else {
                        clearInterval(timerInterval);
                        isActive = false;
                        totalFocusMinutes += sessionLength;
                        timeLeft = sessionLength * 60;
                        saveData();
                        updateTotalFocusUI();
                        updateTimerUI();
                        toggleTimerUI();
                        showNotification('Session Complete!', `Added ${sessionLength} mins to focus tracker.`, 'trophy');
                    }
                }, 1000);
            } else { clearInterval(timerInterval); }
        });

        resetBtn.addEventListener('click', () => {
            isActive = false; clearInterval(timerInterval); timeLeft = sessionLength * 60;
            updateTimerUI(); toggleTimerUI();
        });

        sessionInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value) || 1;
            sessionLength = val < 1 ? 1 : val;
            saveData();
            if (!isActive) { timeLeft = sessionLength * 60; updateTimerUI(); }
        });

        // Tracker Logic
        function updateTotalFocusUI() {
            const h = Math.floor(totalFocusMinutes / 60); const m = totalFocusMinutes % 60;
            document.getElementById('total-focus').textContent = h > 0 ? `${h} hr ${m} min` : `${m} min`;
        }

        resetTrackerBtn.addEventListener('click', () => {
            if(confirm("Reset your total focus time back to 0?")) {
                totalFocusMinutes = 0; saveData(); updateTotalFocusUI();
            }
        });

        // Tasks Logic
        function renderTasks() {
            const list = document.getElementById('task-list');
            if (tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-12 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl"><p class="text-slate-500">Your task list is empty.</p></div>`;
            } else {
                list.innerHTML = tasks.map(t => `
                    <div class="flex items-start gap-4 p-4 rounded-xl border ${t.completed ? 'bg-slate-50 dark:bg-slate-900/60 opacity-60' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm'}">
                        <button onclick="toggleTask(${t.id})" class="mt-0.5 focus:outline-none">
                            <i data-lucide="${t.completed ? 'check-circle' : 'circle'}" class="w-6 h-6 ${t.completed ? 'text-indigo-500' : 'text-slate-300 dark:text-slate-500'}"></i>
                        </button>
                        <span class="flex-1 ${t.completed ? 'line-through text-slate-500' : 'text-slate-700 dark:text-slate-200'}">${t.text}</span>
                        <button onclick="deleteTask(${t.id})" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('task-input');
            if (!input.value.trim()) return;
            tasks.push({ id: Date.now(), text: input.value.trim(), completed: false });
            input.value = '';
            saveData(); renderTasks();
        });

        window.toggleTask = (id) => { tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t); saveData(); renderTasks(); };
        window.deleteTask = (id) => { tasks = tasks.filter(t => t.id !== id); saveData(); renderTasks(); };

        // --- Sync UI Logic ---
        const syncModal = document.getElementById('sync-modal');
        const syncCodeOutput = document.getElementById('sync-code-output');
        
        function updateSyncCodeUI() { syncCodeOutput.value = generateSyncCode(); }

        document.getElementById('open-sync-btn').addEventListener('click', () => {
            updateSyncCodeUI();
            syncModal.classList.remove('hidden');
            setTimeout(() => syncModal.classList.remove('opacity-0'), 10);
        });

        document.getElementById('close-sync').addEventListener('click', () => {
            syncModal.classList.add('opacity-0');
            setTimeout(() => syncModal.classList.add('hidden'), 300);
        });

        document.getElementById('copy-sync-btn').addEventListener('click', () => {
            syncCodeOutput.select();
            document.execCommand('copy');
            showNotification('Code Copied!', 'Paste this code on your other device.', 'copy');
        });

        document.getElementById('import-sync-btn').addEventListener('click', () => {
            const input = document.getElementById('sync-code-input');
            if (importSyncCode(input.value.trim())) {
                input.value = '';
                syncModal.classList.add('opacity-0');
                setTimeout(() => syncModal.classList.add('hidden'), 300);
                showNotification('Sync Successful!', 'Your devices are now matched.', 'check-circle');
            } else {
                alert("Invalid Sync Code. Please make sure you copied the whole text.");
            }
        });

        // Notifications
        let notifTimeout;
        function showNotification(title, message, iconStr) {
            const el = document.getElementById('notification');
            document.getElementById('notif-title').textContent = title;
            document.getElementById('notif-message').textContent = message;
            document.getElementById('notif-icon').setAttribute('data-lucide', iconStr);
            lucide.createIcons();
            
            el.classList.remove('hidden');
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => el.classList.add('hidden'), 4000);
        }
        document.getElementById('close-notif').addEventListener('click', () => document.getElementById('notification').classList.add('hidden'));

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans p-4 md:p-8 transition-colors duration-300">

    <!-- Settings Modal -->
    <!-- Osama - This is v1.2 -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="settings" class="w-6 h-6 text-indigo-500"></i> Settings</h3>
                <button id="close-settings" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-1">End of Day Boundary (Hour)</label>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-3">If you study late, set this to when you sleep. (e.g. 4 = 4:00 AM)</p>
                    <input id="day-offset-input" type="number" min="0" max="23" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500">
                </div>
                <button id="save-settings-btn" class="w-full bg-indigo-600 text-white px-4 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-300">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                    <i data-lucide="target" class="w-7 h-7 text-indigo-500"></i> Focus Space
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Manage your time, conquer your tasks.</p>
            </div>
            
            <div class="mt-4 md:mt-0 flex flex-wrap items-center gap-3">
                <button id="open-settings-btn" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700">
                    <i data-lucide="moon" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Column: Timer & History -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Timer Card -->
                <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 text-center flex flex-col items-center">
                    <h2 class="text-lg font-semibold text-slate-700 dark:text-slate-200 mb-6 flex items-center gap-2">
                        <i data-lucide="clock" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> Focus Timer
                    </h2>
                    
                    <div class="relative flex items-center justify-center mb-8">
                        <svg class="w-64 h-64 transform -rotate-90">
                            <circle cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100 dark:text-slate-800"></circle>
                            <circle id="progress-circle" cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="753.98" stroke-dashoffset="0" class="text-indigo-500 transition-all duration-1000 ease-linear"></circle>
                        </svg>
                        <div id="time-display" class="absolute text-5xl font-black text-slate-800 dark:text-white tabular-nums tracking-tight">25:00</div>
                    </div>

                    <div class="flex items-center gap-3 mb-8 bg-slate-50 dark:bg-slate-800/50 p-2 rounded-lg border border-slate-200 dark:border-slate-700">
                        <label class="text-sm font-medium text-slate-600 dark:text-slate-400 px-2">Session (min):</label>
                        <input id="session-length" type="number" min="1" max="120" value="25" class="w-16 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-md py-1 px-2 text-center font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 text-slate-900 dark:text-white">
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="start-btn" class="flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-md">
                            <i data-lucide="play" class="w-5 h-5"></i> Start Focus
                        </button>
                        <button id="reset-btn" class="flex items-center gap-2 px-4 py-3 rounded-full font-semibold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Restart
                        </button>
                    </div>
                </div>

                <!-- Today's Focus -->
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-6 rounded-2xl shadow-md text-white border border-transparent dark:border-indigo-400/20">
                    <h2 class="text-indigo-100 font-medium mb-1 flex items-center gap-2">
                        <i data-lucide="trophy" class="w-5 h-5"></i> Today's Focus
                    </h2>
                    <div id="today-focus" class="text-4xl font-black tracking-tight mt-1">0 min</div>
                </div>

                <!-- 7 Day History -->
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart-2" class="w-5 h-5 text-indigo-500"></i> Past 7 Days
                    </h2>
                    <div id="history-list" class="space-y-3">
                        <!-- History injected here -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Tasks -->
            <div class="lg:col-span-7">
                <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 h-full">
                    <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
                        <i data-lucide="list-todo" class="w-6 h-6 text-indigo-500"></i> Working Tasks
                    </h2>

                    <form id="task-form" class="flex gap-3 mb-8">
                        <input id="task-input" type="text" placeholder="What are you working on?" class="flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-slate-700 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <button type="submit" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl font-semibold hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors flex items-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i> <span class="hidden sm:inline">Add</span>
                        </button>
                    </form>

                    <div id="task-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // App State
        const STORAGE_KEY = 'focusDashDataV2';
        let isDarkMode = false;
        let sessionLength = 25;
        let timeLeft = 25 * 60;
        let isActive = false;
        let timerInterval = null;
        let tasks = [];
        let dayOffsetHours = 4; // Default to 4 AM boundary
        let dailyStats = {}; // Format: { "YYYY-MM-DD": totalSeconds }

        // --- CORE LOGIC: Date Boundary ---
        // Subtracts the offset hours so night study counts for the previous day
        function getLogicalDate() {
            const now = new Date();
            now.setHours(now.getHours() - dayOffsetHours);
            return now.toISOString().split('T')[0]; // Returns YYYY-MM-DD
        }

        // --- STORAGE SYSTEM ---
        function saveData() {
            const data = { isDarkMode, sessionLength, tasks, dayOffsetHours, dailyStats };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    isDarkMode = data.isDarkMode || false;
                    sessionLength = data.sessionLength || 25;
                    tasks = data.tasks || [];
                    dayOffsetHours = data.dayOffsetHours !== undefined ? data.dayOffsetHours : 4;
                    
                    // Migrate old data if upgrading from V1
                    if (data.totalFocusMinutes && !data.dailyStats) {
                        const today = getLogicalDate();
                        dailyStats = {};
                        dailyStats[today] = data.totalFocusMinutes * 60;
                    } else {
                        dailyStats = data.dailyStats || {};
                    }
                    
                    timeLeft = sessionLength * 60;
                } catch (e) { console.error("Error loading data", e); }
            }
            applyTheme();
            updateTimerUI();
            updateStatsUI();
            renderTasks();
            document.getElementById('day-offset-input').value = dayOffsetHours;
        }

        // --- DOM Elements ---
        const startBtn = document.getElementById('start-btn');
        const sessionInput = document.getElementById('session-length');
        const htmlEl = document.documentElement;
        
        loadData();

        // Theme Logic
        function applyTheme() {
            if (isDarkMode) htmlEl.classList.add('dark');
            else htmlEl.classList.remove('dark');
            document.getElementById('theme-toggle').innerHTML = `<i data-lucide="${isDarkMode ? 'sun' : 'moon'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }
        document.getElementById('theme-toggle').addEventListener('click', () => { isDarkMode = !isDarkMode; applyTheme(); saveData(); });

        // --- TIMER LOGIC ---
        function formatTime(s) {
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
        }

        function updateTimerUI() {
            document.getElementById('time-display').textContent = formatTime(timeLeft);
            sessionInput.value = sessionLength;
            const offset = isActive ? 753.98 - ((timeLeft / (sessionLength * 60)) * 753.98) : 0;
            document.getElementById('progress-circle').style.strokeDashoffset = offset;
        }

        function toggleTimerUI() {
            startBtn.innerHTML = isActive 
                ? '<i data-lucide="pause" class="w-5 h-5"></i> Pause' 
                : '<i data-lucide="play" class="w-5 h-5"></i> Start Focus';
            startBtn.className = isActive 
                ? 'flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400'
                : 'flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all bg-indigo-600 text-white shadow-md';
            sessionInput.disabled = isActive;
            lucide.createIcons();
        }

        startBtn.addEventListener('click', () => {
            isActive = !isActive;
            toggleTimerUI();
            
            if (isActive) {
                // Main Timer Loop
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) { 
                        timeLeft--; 
                        
                        // ** THE FIX: Add time second-by-second to today's stats **
                        const today = getLogicalDate();
                        dailyStats[today] = (dailyStats[today] || 0) + 1;
                        
                        updateTimerUI(); 
                        
                        // Only update the heavy UI every minute to save CPU
                        if (timeLeft % 60 === 0) updateStatsUI();
                        
                    } else {
                        // Timer hits zero organically
                        clearInterval(timerInterval);
                        isActive = false;
                        timeLeft = sessionLength * 60;
                        saveData();
                        updateStatsUI();
                        updateTimerUI();
                        toggleTimerUI();
                        
                        // Play a native beep sound
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator(); osc.connect(ctx.destination);
                        osc.frequency.setValueAtTime(440, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.2);
                    }
                }, 1000);
            } else {
                // When paused, interval clears, but elapsed time is already safely in dailyStats!
                clearInterval(timerInterval);
                saveData(); // Save the partial progress to local storage
                updateStatsUI();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            isActive = false; clearInterval(timerInterval); timeLeft = sessionLength * 60;
            saveData(); updateTimerUI(); toggleTimerUI(); updateStatsUI();
        });

        sessionInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value) || 1; sessionLength = val < 1 ? 1 : val; saveData();
            if (!isActive) { timeLeft = sessionLength * 60; updateTimerUI(); }
        });

        // --- STATS LOGIC ---
        function formatMinutesToHours(totalMinutes) {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function updateStatsUI() {
            const todayStr = getLogicalDate();
            
            // 1. Update Today's Focus
            const todaySeconds = dailyStats[todayStr] || 0;
            const todayMinutes = Math.floor(todaySeconds / 60);
            document.getElementById('today-focus').textContent = formatMinutesToHours(todayMinutes);

            // 2. Build 7-Day History
            const historyList = document.getElementById('history-list');
            let historyHTML = '';
            
            for (let i = 0; i < 7; i++) {
                const targetDate = new Date();
                targetDate.setHours(targetDate.getHours() - dayOffsetHours); // Apply offset
                targetDate.setDate(targetDate.getDate() - i);
                
                const dateStr = targetDate.toISOString().split('T')[0];
                const displayDate = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).format(targetDate);
                
                const seconds = dailyStats[dateStr] || 0;
                const minutes = Math.floor(seconds / 60);
                
                // Calculate bar width (max 4 hours/240 mins = 100%)
                const barWidth = Math.min((minutes / 240) * 100, 100);
                
                let textColor = i === 0 ? "text-indigo-600 dark:text-indigo-400 font-bold" : "text-slate-600 dark:text-slate-400";
                let dayLabel = i === 0 ? "Today" : displayDate;

                historyHTML += `
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="${textColor}">${dayLabel}</span>
                            <span class="font-medium text-slate-700 dark:text-slate-300">${formatMinutesToHours(minutes)}</span>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2">
                            <div class="bg-indigo-500 h-2 rounded-full opacity-80" style="width: ${barWidth}%"></div>
                        </div>
                    </div>
                `;
            }
            historyList.innerHTML = historyHTML;
        }

        // --- SETTINGS UI ---
        const settingsModal = document.getElementById('settings-modal');
        document.getElementById('open-settings-btn').addEventListener('click', () => {
            document.getElementById('day-offset-input').value = dayOffsetHours;
            settingsModal.classList.remove('hidden');
            setTimeout(() => settingsModal.classList.remove('opacity-0'), 10);
        });

        function closeSettings() {
            settingsModal.classList.add('opacity-0');
            setTimeout(() => settingsModal.classList.add('hidden'), 300);
        }
        document.getElementById('close-settings').addEventListener('click', closeSettings);
        
        document.getElementById('save-settings-btn').addEventListener('click', () => {
            let val = parseInt(document.getElementById('day-offset-input').value) || 0;
            if (val < 0) val = 0; if (val > 23) val = 23;
            dayOffsetHours = val;
            saveData();
            updateStatsUI(); // Re-render history with new boundaries
            closeSettings();
        });

        // --- TASKS LOGIC (Unchanged) ---
        function renderTasks() {
            const list = document.getElementById('task-list');
            if (tasks.length === 0) {
                list.innerHTML = `<div class="text-center py-12 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl"><p class="text-slate-500">Your task list is empty.</p></div>`;
            } else {
                list.innerHTML = tasks.map(t => `
                    <div class="flex items-start gap-4 p-4 rounded-xl border ${t.completed ? 'bg-slate-50 dark:bg-slate-900/60 opacity-60' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm'}">
                        <button onclick="toggleTask(${t.id})" class="mt-0.5 focus:outline-none">
                            <i data-lucide="${t.completed ? 'check-circle' : 'circle'}" class="w-6 h-6 ${t.completed ? 'text-indigo-500' : 'text-slate-300 dark:text-slate-500'}"></i>
                        </button>
                        <span class="flex-1 ${t.completed ? 'line-through text-slate-500' : 'text-slate-700 dark:text-slate-200'}">${t.text}</span>
                        <button onclick="deleteTask(${t.id})" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault(); const input = document.getElementById('task-input');
            if (!input.value.trim()) return;
            tasks.push({ id: Date.now(), text: input.value.trim(), completed: false });
            input.value = ''; saveData(); renderTasks();
        });
        window.toggleTask = (id) => { tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t); saveData(); renderTasks(); };
        window.deleteTask = (id) => { tasks = tasks.filter(t => t.id !== id); saveData(); renderTasks(); };

    </script>
</body>
</html>
